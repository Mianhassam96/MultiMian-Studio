<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)"/>

  <!-- Subtle inner glow ring -->
  <rect width="64" height="64" rx="14" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

  <!-- Decorative dots top-right -->
  <circle cx="50" cy="12" r="2.5" fill="rgba(255,255,255,0.35)"/>
  <circle cx="56" cy="18" r="1.5" fill="rgba(255,255,255,0.25)"/>

  <!-- "M" lettermark -->
  <text
    x="32"
    y="44"
    text-anchor="middle"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="36"
    font-weight="900"
    fill="url(#textGrad)"
    filter="url(#glow)"
  >M</text>

  <!-- Bottom accent bar -->
  <rect x="18" y="52" width="28" height="3" rx="1.5" fill="rgba(255,255,255,0.4)"/>
</svg>
